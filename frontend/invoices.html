<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Factures - Sunu Gestion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body{font-family:'Plus Jakarta Sans',sans-serif}.glass{background:rgba(15,23,42,.85);backdrop-filter:blur(12px)}</style>
    <link rel="stylesheet" href="/assets/css/print.css">
    <link rel="stylesheet" href="/assets/css/premium.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen" x-data="invoicesApp()" x-init="init()">

<!-- NAVBAR -->
<nav class="glass border-b border-slate-800 sticky top-0 z-50 no-print">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex justify-between h-16 items-center">
        <a href="/" class="flex items-center gap-2">
            <div class="w-9 h-9 bg-gradient-to-tr from-indigo-500 to-violet-500 rounded-xl flex items-center justify-center"><span class="text-white font-extrabold text-lg">S</span></div>
            <span class="text-lg font-extrabold text-white">Sunu <span class="text-indigo-400">Gestion</span></span>
        </a>
        <div class="hidden md:flex items-center gap-1">
            <a href="/" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition">Dashboard</a>
            <a href="/products.html" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition">Produits</a>
            <a href="/pos.html" class="px-4 py-2 rounded-lg text-sm font-semibold text-emerald-400 hover:bg-emerald-500/10 transition font-bold">Vente Rapide (POS)</a>
            <a href="/invoices.html" class="px-4 py-2 rounded-lg text-sm font-bold text-white bg-slate-800 transition">Factures</a>
            <a href="/expenses.html" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition">Dépenses</a>
            <a href="/visitors.html" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition">Visiteurs</a>
            <a href="/suppliers.html" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition">Fournisseurs</a>
            <a href="/files.html" class="px-4 py-2 rounded-lg text-sm font-semibold text-slate-400 hover:text-white hover:bg-slate-800 transition">Fichiers</a>
        </div>
        <button @click="logout()" class="text-slate-500 hover:text-red-400 transition text-sm font-medium">Déconnexion</button>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex items-center justify-between mb-8">
        <div>
            <h1 class="text-3xl font-extrabold text-white">Factures</h1>
            <button @click="window.print()" class="mt-4 no-print flex items-center gap-2 bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition border border-indigo-500/30"><span>️</span> Imprimer en Couleur</button>
            <p class="text-slate-500 mt-1"><span x-text="invoices.length"></span> facture(s)</p>
        </div>
        <button @click="openCreateModal()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-xl font-bold text-sm transition flex items-center gap-2">
            <span class="text-lg">+</span> Nouvelle facture
        </button>
    </div>

    <!-- Liste factures -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden">
        <table class="w-full text-sm">
            <thead class="border-b border-slate-800">
                <tr class="text-slate-500 text-xs uppercase tracking-wider">
                    <th class="text-left px-5 py-4">N° Facture</th>
                    <th class="text-left px-5 py-4">Client</th>
                    <th class="text-right px-5 py-4">Montant</th>
                    <th class="text-center px-5 py-4">Date</th>
                    <th class="px-5 py-4"></th>
                </tr>
            </thead>
            <tbody class="divide-y divide-slate-800">
                <template x-for="inv in invoices" :key="inv.id">
                    <tr class="hover:bg-slate-800/50 transition">
                        <td class="px-5 py-4 font-bold text-indigo-400" x-text="inv.invoice_number"></td>
                        <td class="px-5 py-4 text-white">
                            <span x-text="inv.client_name"></span>
                            <div x-show="inv.client_phone" class="text-xs text-emerald-400/70 mt-0.5" x-text="'📱 ' + inv.client_phone"></div>
                            <div x-show="inv.payment_method" class="text-xs text-slate-500 mt-1" x-text="'Mode: ' + inv.payment_method"></div>
                        </td>
                        <td class="px-5 py-4 text-right">
                            <div class="font-bold text-white" x-text="formatCFA(inv.total_amount)"></div>
                            <span x-show="inv.status === 'pending_payment' || inv.status === 'pending'" class="text-[10px] bg-amber-500/20 text-amber-400 px-2 py-0.5 rounded-full font-bold uppercase">Attente Valid.</span>
                            <span x-show="inv.status === 'paid'" class="text-[10px] bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded-full font-bold uppercase">Payée</span>
                        </td>
                        <td class="px-5 py-4 text-center">
                            <div class="text-slate-400 font-medium" x-text="formatDate(inv.created_at)"></div>
                            <div x-show="inv.paid_at" class="text-[10px] text-emerald-400 font-bold mt-1 bg-emerald-500/10 px-2 py-0.5 rounded-full inline-block" x-text="'Payé: ' + formatDate(inv.paid_at)"></div>
                        </td>
                        <td class="px-5 py-4 text-right">
                            <div class="flex gap-2 justify-end items-center flex-wrap">
                                <button x-show="inv.payment_proof" @click="viewProof(inv.payment_proof)" class="text-xs text-indigo-400 hover:text-indigo-300 font-semibold px-2 py-1 bg-indigo-500/10 rounded">Reçu</button>
                                <button x-show="inv.status === 'pending_payment' || inv.status === 'pending'" @click="validatePayment(inv.id)" class="text-xs text-amber-400 hover:text-amber-300 font-semibold px-2 py-1 bg-amber-500/10 rounded">Valider</button>
                                <button x-show="inv.client_phone" @click="whatsappRelance(inv)" title="Relancer le client par WhatsApp" class="text-xs text-emerald-400 hover:text-white font-bold px-2 py-1 bg-emerald-500/15 hover:bg-emerald-600 rounded flex items-center gap-1 transition">
                                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
                                    Relancer
                                </button>
                                <button @click="downloadPdf(inv.id, inv.invoice_number)" class="text-xs text-sky-400 hover:text-sky-300 font-semibold px-2 py-1 bg-sky-500/10 rounded">PDF</button>
                                <button @click="deleteInvoice(inv.id)" class="text-xs text-red-400 hover:text-red-300 font-semibold px-2 py-1 bg-red-500/10 rounded">Supprimer</button>
                            </div>
                        </td>
                    </tr>
                </template>
            </tbody>
        </table>
        <div x-show="invoices.length === 0" class="py-12 text-center text-slate-600">Aucune facture. Créez votre première facture.</div>
    </div>
</main>

<!-- Modal View Proof -->
<div x-show="showProofModal" x-transition class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm p-4" @click.self="showProofModal = false">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg p-6 relative">
        <button @click="showProofModal = false" class="absolute top-4 right-4 text-slate-400 hover:text-white">✕</button>
        <h2 class="text-xl font-bold text-white mb-4">Justificatif de Paiement</h2>
        <img :src="currentProofUrl" alt="Preuve de paiement" class="w-full rounded-xl border border-slate-800 object-contain max-h-[70vh]">
        <div class="mt-6 flex justify-end">
            <button @click="showProofModal = false" class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-xl text-sm font-bold">Fermer</button>
        </div>
    </div>
</div>

<!-- Modal Création Facture -->
<div x-show="showModal" x-transition class="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm p-4" @click.self="showModal = false">
    <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-2xl p-6 max-h-[90vh] overflow-y-auto">
        <h2 class="text-xl font-bold text-white mb-6">Nouvelle facture</h2>
        <div x-show="formError" x-text="formError" class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl p-3 mb-4"></div>

        <form @submit.prevent="createInvoice()">
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1">Nom du client *</label>
                    <input type="text" x-model="form.client_name" required class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1">Adresse</label>
                    <input type="text" x-model="form.client_address" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div class="col-span-2">
                    <label class="block text-sm font-semibold text-slate-400 mb-1">📱 Téléphone client (pour relance WhatsApp)</label>
                    <input type="tel" x-model="form.client_phone" placeholder="+221 77 123 45 67" class="w-full bg-slate-800 border border-emerald-700/50 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                </div>
            </div>

            <h3 class="font-bold text-white mb-3">Articles</h3>
            <template x-for="(item, idx) in form.items" :key="idx">
                <div class="grid grid-cols-12 gap-2 mb-2 items-center">
                    <div class="col-span-7">
                        <select x-model="item.product_id" required class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
                            <option value="">— Choisir un produit —</option>
                            <template x-for="p in availableProducts" :key="p.id">
                                <option :value="p.id" x-text="p.name + ' (' + formatCFA(p.price) + ')'"></option>
                            </template>
                        </select>
                    </div>
                    <div class="col-span-3">
                        <input type="number" x-model="item.quantity" min="1" required class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Qté">
                    </div>
                    <div class="col-span-2 text-center">
                        <button type="button" @click="form.items.splice(idx, 1)" class="text-red-400 hover:text-red-300 text-lg" x-show="form.items.length > 1">✕</button>
                    </div>
                </div>
            </template>
            <button type="button" @click="form.items.push({ product_id: '', quantity: 1 })" class="text-indigo-400 hover:text-indigo-300 text-sm font-semibold mt-2">+ Ajouter un article</button>

            <div class="flex gap-3 mt-8 justify-end">
                <button type="button" @click="showModal = false" class="px-5 py-2.5 rounded-xl font-semibold text-sm text-slate-400 hover:bg-slate-800">Annuler</button>
                <button type="submit" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2.5 rounded-xl font-bold text-sm transition">Créer la facture</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
<script src="/assets/js/api.js"></script>
<script>
function invoicesApp() {
    return {
        invoices: [], showModal: false, availableProducts: [],
        form: { client_name: '', client_address: '', client_phone: '', items: [{ product_id: '', quantity: 1 }] },
        formError: '', loading: false, showProofModal: false, currentProofUrl: '',
        async init() {
            if (!requireAuth()) return;
            await this.loadInvoices();
        },
        async loadInvoices() {
            const res = await apiFetch('/invoices');
            if (res?.ok) this.invoices = await res.json();
        },
        async openCreateModal() {
            const res = await apiFetch('/products');
            if (res?.ok) this.availableProducts = await res.json();
            this.form = { client_name: '', client_address: '', client_phone: '', items: [{ product_id: '', quantity: 1 }] };
            this.formError = '';
            this.showModal = true;
        },
        async createInvoice() {
            this.formError = '';
            const items = this.form.items.filter(i => i.product_id).map(i => ({ product_id: parseInt(i.product_id), quantity: parseInt(i.quantity) }));
            if (items.length === 0) { this.formError = 'Ajoutez au moins un article.'; return; }
            const res = await apiFetch('/invoices', {
                method: 'POST',
                body: JSON.stringify({ client_name: this.form.client_name, client_address: this.form.client_address, client_phone: this.form.client_phone, items })
            });
            if (res?.ok) { this.showModal = false; await this.loadInvoices(); }
            else { const d = await res?.json(); this.formError = d?.error || 'Erreur.'; }
        },
        viewProof(url) { this.currentProofUrl = url; this.showProofModal = true; },
        async validatePayment(id) {
            if (!confirm('Confirmer ce paiement et marquer la facture comme payée ?')) return;
            const res = await apiFetch(`/invoices/${id}/status`, { method: 'PUT', body: JSON.stringify({ status: 'paid' }) });
            if (res?.ok) { await this.loadInvoices(); showToast('✅ Facture validée !', 'success'); }
            else if (res === null) { showToast('🔐 Session expirée.', 'error'); }
            else { showToast('❌ Erreur lors de la validation.', 'error'); }
        },
        async downloadPdf(id, invoiceNumber) {
            showToast('⏳ Génération du PDF...', 'info');
            try {
                const res = await fetch(`/api/invoices/${id}/pdf`, { headers: { 'Authorization': `Bearer ${getToken()}` } });
                if (!res?.ok) { showToast('❌ Erreur lors de la génération du PDF.', 'error'); return; }
                const blob = await res.blob();
                const fileUrl = URL.createObjectURL(blob);
                
                // Ouvrir directement dans un nouvel onglet pour l'afficher
                const newWindow = window.open(fileUrl, '_blank');
                if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                    // Fallback de téléchargement si le bloqueur de pop-up bloque l'ouverture
                    const a = document.createElement('a');
                    a.href = fileUrl; a.download = `facture_${invoiceNumber}.pdf`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    showToast('✅ PDF téléchargé (bloqueur activé) !', 'success');
                } else {
                    showToast('✅ PDF affiché dans un nouvel onglet !', 'success');
                }
            } catch (err) {
                showToast('❌ Erreur lors du chargement du PDF.', 'error');
            }
        },
        async deleteInvoice(id) {
            if (!confirm('Supprimer définitivement cette facture ?')) return;
            const res = await apiFetch(`/invoices/${id}`, { method: 'DELETE' });
            if (res?.ok) { await this.loadInvoices(); showToast('🗑️ Facture supprimée.', 'success'); }
            else { showToast('❌ Impossible de supprimer.', 'error'); }
        },
        whatsappRelance(inv) {
            if (!inv.client_phone) { showToast('⚠️ Aucun numéro pour ce client.', 'error'); return; }
            const montant = new Intl.NumberFormat('fr-FR').format(inv.total_amount);
            const msg = `Bonjour ${inv.client_name} 👋,\n\nVotre facture N° *${inv.invoice_number}* d'un montant de *${montant} FCFA* est en attente de règlement.\n\nMerci de procéder au paiement dans les meilleurs délais.\n\nCordialement 🙏`;
            const phone = inv.client_phone.replace(/[^\d+]/g, '');
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            showToast('✅ WhatsApp ouvert pour la relance !', 'success');
        },
        formatCFA(v) { return new Intl.NumberFormat('fr-FR').format(v) + ' FCFA'; },
        formatDate(d) { return d ? new Date(d).toLocaleDateString('fr-FR') : '—'; },
        logout() { localStorage.clear(); window.location.href = '/login.html'; }
    }
}
</script>
<script src="/assets/js/calculator.js"></script>
</body>
</html>
