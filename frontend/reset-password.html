<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réinitialiser le mot de passe — Sunu Gestion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>body{font-family:'Plus Jakarta Sans',sans-serif}.glass{background:rgba(15,23,42,.85);backdrop-filter:blur(12px)}</style>
    <link rel="stylesheet" href="/assets/css/print.css">
    <link rel="stylesheet" href="/assets/css/premium.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen flex items-center justify-center p-4" x-data="resetApp()" x-init="init()">

    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold text-white">Nouveau mot de passe</h1>
            <button @click="window.print()" class="mt-4 no-print flex items-center gap-2 bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition border border-indigo-500/30"><span>️</span> Imprimer en Couleur</button>
            <p class="text-slate-500 mt-2">Choisissez votre nouveau mot de passe sécurisé.</p>
        </div>

        <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 shadow-2xl">
            <form @submit.prevent="submitReset" class="space-y-6">
                <div x-show="message" x-text="message" class="bg-emerald-500/10 border border-emerald-500/30 text-emerald-400 text-sm rounded-xl p-4 font-medium"></div>
                <div x-show="error" x-text="error" class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-xl p-4 font-medium"></div>

                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-2">Nouveau mot de passe</label>
                    <input type="password" x-model="newPassword" required minlength="8" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-600" placeholder="••••••••">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-2">Confirmer le mot de passe</label>
                    <input type="password" x-model="confirmPassword" required class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 placeholder-slate-600" placeholder="••••••••">
                </div>

                <button type="submit" :disabled="loading || newPassword !== confirmPassword" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-xl font-bold shadow-lg shadow-indigo-500/25 transition flex justify-center items-center gap-2">
                    <span x-show="loading" class="w-5 h-5 rounded-full border-2 border-white/30 border-t-white animate-spin"></span>
                    <span>Réinitialiser</span>
                </button>
            </form>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
<script src="/assets/js/api.js"></script>
<script>
function resetApp() {
    return {
        email: '', token: '', newPassword: '', confirmPassword: '', loading: false, message: '', error: '',
        init() {
            const params = new URLSearchParams(window.location.search);
            this.email = params.get('email');
            this.token = params.get('token');
            if (!this.email || !this.token) {
                this.error = 'Lien invalide ou expiré.';
                this.loading = true; // Empêche le submit
            }
        },
        async submitReset() {
            if (this.newPassword !== this.confirmPassword) return;
            this.loading = true; this.message = ''; this.error = '';
            try {
                const res = await apiFetch('/auth/reset-password', {
                    method: 'POST',
                    body: JSON.stringify({ email: this.email, token: this.token, newPassword: this.newPassword })
                });
                const d = await res.json();
                if (res.ok) {
                    this.message = d.message + ' Redirection...';
                    setTimeout(() => window.location.href = '/login.html', 2000);
                } else {
                    this.error = d.error || 'Une erreur est survenue.';
                }
            } catch(e) { this.error = 'Erreur de connexion.'; }
            finally { this.loading = false; }
        }
    }
}
</script>
</body>
</html>
