    <script>

    function loginApp() {
        return {
            email: '', password: '', error: '', loading: false,
            init() {
                if (getToken()) {
                    const p = new URLSearchParams(window.location.search);
                    window.location.href = p.get('redirect') === 'super-admin' ? '/super-admin.html' : '/';
                }
                const p = new URLSearchParams(window.location.search);
                if (p.get('msg')) this.error = decodeURIComponent(p.get('msg'));
            },
            async login() {
                this.error = ''; this.loading = true;
                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ email: this.email, password: this.password })
                    });
                    const data = await res.json();
                    if (!res.ok) { this.error = data.error || 'Erreur de connexion.'; this.loading = false; return; }
                    saveAuth(data);
                    const p = new URLSearchParams(window.location.search);
                    window.location.href = p.get('redirect') === 'super-admin' ? '/super-admin.html' : '/';
                } catch (e) { this.error = 'Erreur réseau.'; }
                this.loading = false;
            }
        }
    }
    </script>
