                <div class="hidden md:flex items-center gap-1">

<main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-extrabold text-white">Fournisseurs</h1>
            <button @click="window.print()" class="mt-4 no-print flex items-center gap-2 bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition border border-indigo-500/30"><span>️</span> Imprimer en Couleur</button>
            <p class="text-slate-500 mt-1">Gérez votre carnet d'adresses de partenaires et fournisseurs.</p>
        </div>
        <button @click="showModal = true" class="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold shadow-lg shadow-indigo-500/25 transition flex items-center gap-2">
            <span>+</span> Nouveau fournisseur
        </button>
    </div>

    <!-- Table -->
    <div class="bg-slate-900 border border-slate-800 rounded-2xl overflow-hidden shadow-xl">
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-slate-800/50 text-slate-400 text-xs uppercase tracking-wider">
                        <th class="px-6 py-4 font-bold">Entreprise</th>
                        <th class="px-6 py-4 font-bold">Contact</th>
                        <th class="px-6 py-4 font-bold">Téléphone</th>
                        <th class="px-6 py-4 font-bold">Email</th>
                        <th class="px-6 py-4 font-bold">Adresse</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-800">
                    <template x-for="s in suppliers" :key="s.id">
                        <tr class="hover:bg-slate-800/30 transition group">
                            <td class="px-6 py-4">
                                <div class="font-bold text-white group-hover:text-indigo-400 transition" x-text="s.name"></div>
                            </td>
                            <td class="px-6 py-4 text-sm text-slate-300" x-text="s.contact_person || '-'"></td>
                            <td class="px-6 py-4 text-sm text-slate-300" x-text="s.phone || '-'"></td>
                            <td class="px-6 py-4 text-sm text-slate-400" x-text="s.email || '-'"></td>
                            <td class="px-6 py-4 text-sm text-slate-500" x-text="s.address || '-'"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
            <div x-show="suppliers.length === 0" class="py-20 text-center text-slate-600">
                <div class="text-5xl mb-4 opacity-20">ðŸ‘¥</div>
                <p>Aucun fournisseur enregistré pour le moment.</p>
            </div>
        </div>
    </div>
</main>

<!-- Modal Ajout -->
<div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm" x-cloak>
    <div class="bg-slate-900 border border-slate-800 rounded-3xl p-8 max-w-lg w-full shadow-2xl" @click.away="showModal = false">
        <h2 class="text-2xl font-extrabold text-white mb-6">Ajouter un fournisseur</h2>
        <form @submit.prevent="saveSupplier" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1.5">Nom de l'entreprise *</label>
                <input type="text" x-model="form.name" required class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Personne contact</label>
                    <input type="text" x-model="form.contact_person" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-400 mb-1.5">Téléphone</label>
                    <input type="text" x-model="form.phone" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1.5">Email</label>
                <input type="email" x-model="form.email" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-slate-400 mb-1.5">Adresse</label>
                <textarea x-model="form.address" rows="2" class="w-full bg-slate-800 border border-slate-700 text-white rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>
            <div class="flex gap-4 pt-4">
                <button type="button" @click="showModal = false" class="flex-1 px-6 py-3 rounded-xl font-bold text-slate-400 hover:bg-slate-800 transition">Annuler</button>
                <button type="submit" class="flex-1 bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-3 rounded-xl font-bold transition">Enregistrer</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/alpinejs@3/dist/cdn.min.js" defer></script>
<script src="/assets/js/api.js"></script>
<script>
function supplierApp() {
    return {
        suppliers: [], showModal: false, loading: false,
        form: { name: '', contact_person: '', email: '', phone: '', address: '' },
        async init() {
            if (!requireAuth()) return;
            await this.loadSuppliers();
        },
        async loadSuppliers() {
            const res = await apiFetch('/suppliers');
            if (res?.ok) this.suppliers = await res.json();
        },
        async saveSupplier() {
            const res = await apiFetch('/suppliers', {
                method: 'POST',
                body: JSON.stringify(this.form)
            });
            if (res?.ok) {
                await this.loadSuppliers();
                this.showModal = false;
                this.form = { name: '', contact_person: '', email: '', phone: '', address: '' };
            }
        }
    }
}
</script>
<script src="/assets/js/calculator.js"></script>
</body>
</html>
